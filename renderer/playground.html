<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satori Gallery</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #09090e;
  --surface: #111118;
  --border: #1e1e2c;
  --border2: #2a2a3a;
  --text: #e8e8f0;
  --muted: #6b6b80;
  --accent: #7c6ef5;
  --accent2: #6058e0;
  --panel-w: 420px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Header ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(9,9,14,0.92);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.logo {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: #fff;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }

.search-wrap {
  flex: 1;
  max-width: 640px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  padding: 10px 48px 10px 16px;
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap .search-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 16px;
  pointer-events: none;
}

.generate-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  padding: 9px 20px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.2px;
}
.generate-btn:hover { background: #8b80f9; }
.generate-btn:active { transform: scale(0.97); }
.generate-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

.header-count {
  font-size: 12px;
  color: var(--muted);
  flex-shrink: 0;
  font-family: monospace;
}

/* ── Filter pills ── */
.filter-bar {
  padding: 14px 28px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.filter-bar::-webkit-scrollbar { display: none; }
.pill {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 20px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
}
.pill:hover { border-color: #555; color: var(--text); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Gallery ── */
.gallery-wrap {
  padding: 28px;
  transition: padding-right 0.3s;
}
.gallery-wrap.panel-open { padding-right: calc(var(--panel-w) + 28px); }

.masonry {
  columns: 4 220px;
  column-gap: 16px;
}

.tile {
  break-inside: avoid;
  margin-bottom: 16px;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
}
.tile:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.tile.active-tile { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }

.gif-badge {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(0,0,0,0.72);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 5px;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.8px;
  color: #a78bfa;
  padding: 2px 6px;
  text-transform: uppercase;
  backdrop-filter: blur(4px);
  pointer-events: none;
}

.tile-skeleton {
  width: 100%;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--border2);
  font-size: 24px;
}
.tile-skeleton.loading { animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.tile img {
  width: 100%;
  height: auto;
  display: block;
}

.tile-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.2s;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 14px;
  gap: 6px;
}
.tile:hover .tile-overlay { opacity: 1; }

.tile-label {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
}
.tile-cat {
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.tile-customize {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 6px;
  align-self: flex-start;
  margin-top: 4px;
  transition: background 0.1s;
}
.tile:hover .tile-customize { background: #8b80f9; }

/* ── Slide-in panel ── */
.panel {
  position: fixed;
  top: 0;
  right: 0;
  width: var(--panel-w);
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 200;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}
.panel.open { transform: translateX(0); }

.panel-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-title { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
.panel-cat { font-size: 11px; color: var(--muted); margin-top: 2px; }
.panel-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.1s;
}
.panel-close:hover { color: var(--text); }

/* Panel preview area */
.panel-preview {
  background: #07070c;
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  border-bottom: 1px solid var(--border);
}
.panel-preview img {
  max-width: 100%;
  max-height: 280px;
  object-fit: contain;
  display: block;
}
.panel-preview .panel-spinner {
  width: 28px;
  height: 28px;
  border: 3px solid #222;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.panel-timing {
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-size: 10px;
  color: #444;
  font-family: monospace;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.panel-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}

.pf { display: flex; flex-direction: column; gap: 5px; }
.pf label { font-size: 12px; color: #888; font-weight: 500; }
.pf input[type="text"],
.pf input[type="number"],
.pf select,
.pf textarea {
  background: #1a1a24;
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
  width: 100%;
  font-family: inherit;
  transition: border-color 0.15s;
}
.pf input:focus, .pf select:focus, .pf textarea:focus { border-color: var(--accent); }
.pf textarea { resize: vertical; min-height: 56px; }

.color-row { display: flex; align-items: center; gap: 8px; }
.color-row input[type="color"] {
  width: 36px; height: 32px;
  border: 1px solid var(--border2); border-radius: 6px;
  background: #1a1a24; cursor: pointer; padding: 2px;
}
.color-row input[type="text"] { flex: 1; font-family: monospace; }

.swatch-row { display: flex; gap: 6px; flex-wrap: wrap; }
.swatch {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
}
.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: #fff; }

.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.p-btn {
  background: #1a1a24;
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  padding: 6px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.12s;
  line-height: 1.3;
}
.p-btn:hover { border-color: #555; color: var(--text); }
.p-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.panel-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.rerender-btn {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  padding: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.rerender-btn:hover { background: #8b80f9; }
.rerender-btn:disabled { background: #333; color: #555; cursor: not-allowed; }
.download-btn {
  background: #1a1a24;
  color: var(--text);
  border: 1px solid var(--border2);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  padding: 11px 16px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.download-btn:hover { border-color: #555; }

/* bg picks */
.bg-picks { display: flex; gap: 6px; flex-wrap: wrap; }
.bg-pick {
  background: #1a1a24;
  border: 1px solid var(--border2);
  border-radius: 5px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  padding: 4px 8px;
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.bg-pick:hover { border-color: #555; color: var(--text); }

/* ── Empty / generating states ── */
.gallery-status {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
  font-size: 14px;
}

/* ── Generating spinner overlay in header ── */
.gen-badge {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--muted);
}
.gen-badge.visible { display: flex; }
.gen-badge .mini-spin {
  width: 14px; height: 14px;
  border: 2px solid #333;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .masonry { columns: 2 160px; }
  .panel { width: 100%; }
  .gallery-wrap.panel-open { padding-right: 28px; }
  .header-count { display: none; }
}
@media (max-width: 540px) {
  .masonry { columns: 2 140px; column-gap: 10px; }
  .gallery-wrap { padding: 14px; }
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo"><span class="logo-dot"></span>Satori</div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search variants, or describe a card to generate…" autocomplete="off" />
    <span class="search-icon">⌕</span>
  </div>
  <div class="gen-badge" id="genBadge"><div class="mini-spin"></div><span id="genLabel">Generating…</span></div>
  <button class="generate-btn" id="generateBtn" onclick="generateFromPrompt()">Generate ↵</button>
  <span class="header-count" id="headerCount"></span>
</header>

<!-- ── Filter pills ── -->
<div class="filter-bar" id="filterBar">
  <button class="pill active" data-cat="all" onclick="setFilter(this)">All</button>
  <button class="pill" data-cat="Core" onclick="setFilter(this)">Core</button>
  <button class="pill" data-cat="Social" onclick="setFilter(this)">Social</button>
  <button class="pill" data-cat="Business" onclick="setFilter(this)">Business</button>
  <button class="pill" data-cat="Content" onclick="setFilter(this)">Content</button>
  <button class="pill" data-cat="Lifestyle" onclick="setFilter(this)">Lifestyle</button>
  <button class="pill" data-cat="Media" onclick="setFilter(this)">Media</button>
  <button class="pill" data-cat="Fashion" onclick="setFilter(this)">Fashion</button>
  <button class="pill" data-cat="Automotive" onclick="setFilter(this)">Automotive</button>
  <button class="pill" data-cat="Web3" onclick="setFilter(this)">Web3</button>
  <button class="pill" data-cat="Nonprofit" onclick="setFilter(this)">Nonprofit</button>
  <button class="pill" data-cat="Interior" onclick="setFilter(this)">Interior</button>
  <button class="pill" data-cat="HR" onclick="setFilter(this)">HR & Culture</button>
  <button class="pill" data-cat="Animated" onclick="setFilter(this)">🎬 Animated</button>
</div>

<!-- ── Gallery ── -->
<div class="gallery-wrap" id="galleryWrap">
  <div class="masonry" id="masonry"></div>
  <div class="gallery-status" id="galleryStatus" style="display:none">No variants match your search.</div>
</div>

<!-- ── Customise panel ── -->
<div class="panel" id="panel">

  <div class="panel-header">
    <div>
      <div class="panel-title" id="panelTitle">stat-hero</div>
      <div class="panel-cat" id="panelCat">Core</div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>

  <div class="panel-preview" id="panelPreview">
    <span style="font-size:32px;opacity:0.2">🎨</span>
  </div>

  <div class="panel-body">

    <div>
      <div class="panel-section-label">Preset</div>
      <div class="preset-grid" id="panelPresetGrid">
        <button class="p-btn" data-preset="instagram-story" onclick="setPanelPreset(this)">Instagram Story<br><small>1080×1920</small></button>
        <button class="p-btn active" data-preset="instagram-square" onclick="setPanelPreset(this)">Instagram Square<br><small>1080×1080</small></button>
        <button class="p-btn" data-preset="twitter-x" onclick="setPanelPreset(this)">Twitter / X<br><small>1200×675</small></button>
        <button class="p-btn" data-preset="linkedin-post" onclick="setPanelPreset(this)">LinkedIn<br><small>1200×627</small></button>
        <button class="p-btn" data-preset="og-image" onclick="setPanelPreset(this)">OG Image<br><small>1200×630</small></button>
        <button class="p-btn" data-preset="facebook-post" onclick="setPanelPreset(this)">Facebook<br><small>1200×630</small></button>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Brand</div>
      <div class="pf">
        <label>Brand name</label>
        <input type="text" id="pBrandName" value="Acme Studio" />
      </div>
      <div class="pf" style="margin-top:10px">
        <label>Primary color</label>
        <div class="color-row">
          <input type="color" id="pColorPicker" value="#5b5bd6" oninput="syncPanelColor('picker')" />
          <input type="text" id="pColorHex" value="#5b5bd6" oninput="syncPanelColor('hex')" placeholder="#rrggbb" />
        </div>
      </div>
      <div class="pf" style="margin-top:8px">
        <div class="swatch-row" id="pSwatchRow"></div>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Content</div>
      <div class="pf">
        <label>Headline</label>
        <input type="text" id="pHeadline" value="The future ships today" />
      </div>
      <div class="pf" style="margin-top:8px">
        <label>Subheadline</label>
        <input type="text" id="pSubheadline" value="" />
      </div>
      <div class="pf" style="margin-top:8px">
        <label>Stat / Badge</label>
        <input type="text" id="pStat" value="" />
      </div>
      <div class="pf" style="margin-top:8px">
        <label>CTA text</label>
        <input type="text" id="pCtaText" value="" />
      </div>
    </div>

    <div>
      <div class="panel-section-label">Background Image</div>
      <div class="pf">
        <div style="display:flex;gap:6px;align-items:center">
          <input type="text" id="pBgUrl" placeholder="Pexels or direct URL" style="flex:1" />
          <button onclick="document.getElementById('pBgUrl').value='';schedulePanelRender()" style="background:#1a1a24;border:1px solid var(--border2);border-radius:6px;color:#888;font-size:12px;padding:0 10px;cursor:pointer;height:32px;flex-shrink:0">✕</button>
        </div>
      </div>
      <div class="bg-picks" style="margin-top:8px" id="bgPicks"></div>
    </div>

    <div>
      <div class="panel-section-label">Animation (GIF)</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <label style="display:flex;align-items:center;gap:7px;font-size:13px;color:#aaa;cursor:pointer">
          <input type="checkbox" id="pAnimateToggle" onchange="onAnimateToggle()" style="accent-color:var(--accent);cursor:pointer;width:15px;height:15px">
          Render as animated GIF
        </label>
      </div>
      <div id="pAnimateOpts" style="display:none;flex-direction:column;gap:8px">
        <div class="pf">
          <label>Animation type</label>
          <select id="pAnimationType" onchange="schedulePanelRender()">
            <option value="shimmer">Shimmer — light sweep across card</option>
            <option value="fade-in">Fade In — card fades from dark</option>
            <option value="pulse">Pulse — gentle brightness pulse</option>
            <option value="counter">Counter — stat number counts up</option>
            <option value="typewriter">Typewriter — headline types out</option>
          </select>
        </div>
        <div style="display:flex;gap:8px">
          <div class="pf" style="flex:1">
            <label>Frames (2–16)</label>
            <input type="number" id="pFrames" value="10" min="2" max="16" oninput="schedulePanelRender()" />
          </div>
          <div class="pf" style="flex:1">
            <label>Speed (delay cs)</label>
            <input type="number" id="pDelay" value="7" min="2" max="30" oninput="schedulePanelRender()" />
          </div>
        </div>
        <div style="font-size:11px;color:#555;line-height:1.5">
          GIFs render at max 480px. Works in Gmail, Apple Mail, iOS Mail.<br>Outlook shows first frame only (graceful fallback).
        </div>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Extra (JSON)</div>
      <div class="pf">
        <textarea id="pExtra" placeholder='{ "rating": 5, "price": "$99" }'></textarea>
      </div>
    </div>

  </div><!-- /panel-body -->

  <div class="panel-footer">
    <button class="rerender-btn" id="rerenderBtn" onclick="panelRender()">Re-render</button>
    <button class="download-btn" id="downloadBtn" onclick="downloadCard()">↓ Save</button>
  </div>
</div><!-- /panel -->

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let activeFilter   = 'all'
let searchQuery    = ''
let activeTileId   = null
let panelPreset    = 'instagram-square'
let panelRendering = false
let panelDebounce  = null
let currentBlobUrl = null
let tileImageCache = {}      // variant id → blob URL

// ─────────────────────────────────────────────────────────────
// FILTER + SEARCH
// ─────────────────────────────────────────────────────────────
function setFilter(btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'))
  btn.classList.add('active')
  activeFilter = btn.dataset.cat
  renderGallery()
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim()
  renderGallery()
})

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateFromPrompt()
})

// Unique key per variant entry (animated variants share variant id but differ by _uid)
function vkey(v) { return v._uid || v.id }

function filteredVariants() {
  return VARIANTS.filter(v => {
    const catMatch = activeFilter === 'all' || v.cat === activeFilter
    const q = searchQuery
    const txtMatch = !q || v.id.includes(q) || v.label.toLowerCase().includes(q) || v.cat.toLowerCase().includes(q)
    return catMatch && txtMatch
  })
}

// ─────────────────────────────────────────────────────────────
// GALLERY RENDER
// ─────────────────────────────────────────────────────────────
function renderGallery() {
  const masonry = document.getElementById('masonry')
  const status  = document.getElementById('galleryStatus')
  const list    = filteredVariants()

  document.getElementById('headerCount').textContent = `${VARIANTS.length} variants`

  if (!list.length) {
    masonry.innerHTML = ''
    status.style.display = 'block'
    return
  }
  status.style.display = 'none'

  // Keep existing tiles if possible; only add missing ones
  const existing = new Set(Array.from(masonry.querySelectorAll('.tile')).map(t => t.dataset.vkey))
  const needed   = new Set(list.map(vkey))

  // Remove tiles no longer needed
  masonry.querySelectorAll('.tile').forEach(t => {
    if (!needed.has(t.dataset.vkey)) t.remove()
  })

  // Add tiles not yet in grid
  list.forEach(v => {
    if (existing.has(vkey(v))) return
    masonry.appendChild(buildTile(v))
  })

  // Re-order tiles to match filtered order
  list.forEach(v => {
    const tile = masonry.querySelector(`[data-vkey="${vkey(v)}"]`)
    if (tile) masonry.appendChild(tile)
  })

  // Observe all tiles without images yet
  masonry.querySelectorAll('.tile').forEach(tile => {
    if (!tile.querySelector('img') && !tile.classList.contains('observed')) {
      tile.classList.add('observed')
      tileObserver.observe(tile)
    }
  })
}

function buildTile(v) {
  const aspectMap = {
    'instagram-square': '1/1',
    'instagram-story':  '9/16',
    'twitter-x':        '200/113',
    'og-image':         '120/63',
    'linkedin-post':    '191/100',
    'facebook-post':    '120/63',
  }
  const ratio  = aspectMap[v.preset] || '1/1'
  const key    = vkey(v)
  const gifBadge = v.animated ? '<div class="gif-badge">GIF</div>' : ''

  const tile = document.createElement('div')
  tile.className = 'tile' + (activeTileId === key ? ' active-tile' : '')
  tile.dataset.vkey = key
  tile.onclick = () => openPanel(v)

  if (tileImageCache[key]) {
    const tag = v.animated ? 'img' : 'img'   // both use <img>; GIF auto-plays
    tile.innerHTML = `
      <img src="${tileImageCache[key]}" alt="${v.label}" loading="lazy">
      ${gifBadge}
      <div class="tile-overlay">
        <div class="tile-cat">${v.cat}</div>
        <div class="tile-label">${v.label}</div>
        <div class="tile-customize">Customize ↗</div>
      </div>`
  } else {
    tile.innerHTML = `
      <div class="tile-skeleton loading" style="aspect-ratio:${ratio};font-size:28px">⬜</div>
      ${gifBadge}
      <div class="tile-overlay">
        <div class="tile-cat">${v.cat}</div>
        <div class="tile-label">${v.label}</div>
        <div class="tile-customize">Customize ↗</div>
      </div>`
  }
  return tile
}

// ─────────────────────────────────────────────────────────────
// RENDER QUEUE — viewport-aware, priority-ordered.
//
// Rules:
//  1. Max RENDER_CONCURRENCY simultaneous fetches (= worker slots).
//  2. visibleVids tracks tiles currently in the viewport.
//  3. When a tile LEAVES the viewport it is pruned from the
//     pending queue (scroll-thrash cancellation).
//  4. When a tile ENTERS, it is pushed to the FRONT of the queue
//     so currently-visible tiles always render before off-screen
//     tiles that slipped in during a fast scroll.
//  5. renderTile checks visibleVids before firing; if the tile is
//     no longer visible it is re-observed so it can re-enter later.
// ─────────────────────────────────────────────────────────────
const RENDER_CONCURRENCY = 4
let   activeRenders      = 0
const renderQueue        = []          // [{ tile, vid, retries }]
const visibleVids        = new Set()   // vids currently in viewport
const inProgressVids     = new Set()   // vids currently being fetched

function enqueueRender(tile, vid) {
  if (inProgressVids.has(vid))                        return
  if (tileImageCache[vid] || tile.querySelector('img')) return
  const idx = renderQueue.findIndex(r => r.vid === vid)
  if (idx !== -1) renderQueue.splice(idx, 1)
  if (visibleVids.has(vid)) {
    renderQueue.unshift({ tile, vid, retries: 0 })
  } else {
    renderQueue.push({ tile, vid, retries: 0 })
  }
  drainRenderQueue()
}

function cancelStaleQueueEntries() {
  for (let i = renderQueue.length - 1; i >= 0; i--) {
    const { vid, tile } = renderQueue[i]
    if (!visibleVids.has(vid)) {
      renderQueue.splice(i, 1)
      if (!tileImageCache[vid] && !tile.querySelector('img')) {
        tile.classList.remove('observed')
        tileObserver.observe(tile)
      }
    }
  }
}

function drainRenderQueue() {
  while (activeRenders < RENDER_CONCURRENCY && renderQueue.length > 0) {
    const job = renderQueue.shift()
    if (!visibleVids.has(job.vid) && renderQueue.some(r => visibleVids.has(r.vid))) {
      renderQueue.push(job)
      continue
    }
    inProgressVids.add(job.vid)
    activeRenders++
    renderTile(job.tile, job.vid, job.retries).finally(() => {
      inProgressVids.delete(job.vid)
      activeRenders--
      drainRenderQueue()
    })
  }
}

// ── Single observer handles both ENTER and EXIT events.
const tileObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const tile = entry.target
    const vid  = tile.dataset.vkey   // use vkey not vid

    if (entry.isIntersecting) {
      visibleVids.add(vid)
      if (tileImageCache[vid] || tile.querySelector('img')) return
      tileObserver.unobserve(tile)
      tile.classList.add('observed')
      enqueueRender(tile, vid)
    } else {
      visibleVids.delete(vid)
      cancelStaleQueueEntries()
    }
  })
}, { rootMargin: '80px' })

function tileError(tile, key, msg) {
  const skel = tile.querySelector('.tile-skeleton')
  if (!skel) return
  skel.classList.remove('loading')
  skel.textContent = '⚠'
  skel.style.cssText += ';color:#555;cursor:pointer'
  skel.title = msg + ' — click to retry'
  skel.onclick = () => {
    skel.textContent = '⬜'
    skel.style.cursor = ''
    skel.onclick = null
    tile.classList.remove('observed')
    tileObserver.observe(tile)
  }
}

async function renderTile(tile, key, retries = 0) {
  const v = VARIANTS.find(x => vkey(x) === key)
  if (!v) return

  if (!visibleVids.has(key) && retries === 0) {
    tile.classList.remove('observed')
    tileObserver.observe(tile)
    return
  }

  const skel = tile.querySelector('.tile-skeleton')
  if (skel) skel.classList.add('loading')

  const endpoint = v.animated ? '/render-animated' : '/render'
  const payload  = buildPayload(v.id, v.color, v.preset, v.defaults)
  if (v.animated) {
    payload.animation = v.animation || 'shimmer'
    payload.frames    = 10
    payload.delay     = 7
  }

  try {
    const res = await fetch(`${API_BASE}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
      body: JSON.stringify(payload),
    })

    if (!res.ok) {
      if (retries < 1 && res.status >= 500) {
        await new Promise(r => setTimeout(r, 1000 + Math.random() * 600))
        renderQueue.unshift({ tile, vid: key, retries: retries + 1 })
      } else {
        tileError(tile, key, `HTTP ${res.status}`)
      }
      return
    }

    const mime     = v.animated ? 'image/gif' : 'image/png'
    const blob     = new Blob([await res.arrayBuffer()], { type: mime })
    const url      = URL.createObjectURL(blob)
    tileImageCache[key] = url
    const gifBadge = v.animated ? '<div class="gif-badge">GIF</div>' : ''
    tile.innerHTML = `
      <img src="${url}" alt="${v.label}" loading="lazy">
      ${gifBadge}
      <div class="tile-overlay">
        <div class="tile-cat">${v.cat}</div>
        <div class="tile-label">${v.label}</div>
        <div class="tile-customize">Customize ↗</div>
      </div>`
  } catch {
    if (retries < 1) {
      await new Promise(r => setTimeout(r, 1200 + Math.random() * 800))
      renderQueue.unshift({ tile, vid: key, retries: retries + 1 })
    } else {
      tileError(tile, key, 'Network error')
    }
  }
}

function buildPayload(variant, color, preset, extra = {}) {
  const v = VARIANTS.find(x => x.id === variant)
  const brandName = v?.defaults?.brandName || 'Acme Studio'
  return {
    variant,
    brandName,
    primaryColor: color,
    headline: v?.defaults?.headline || 'The future ships today',
    preset: preset || 'instagram-square',
    tokens: { _cb: String(Date.now()) },
    ...extra,
  }
}

// ─────────────────────────────────────────────────────────────
// PANEL
// ─────────────────────────────────────────────────────────────
const SWATCHES = [
  '#0F3460','#1D3557','#5b5bd6','#7c3aed','#0ea5e9',
  '#0a7c42','#c0392b','#e11d48','#f59e0b','#111111',
]

function buildSwatches() {
  const row = document.getElementById('pSwatchRow')
  SWATCHES.forEach(c => {
    const sw = document.createElement('div')
    sw.className = 'swatch'
    sw.style.background = c
    sw.title = c
    sw.onclick = () => {
      document.querySelectorAll('#pSwatchRow .swatch').forEach(s => s.classList.remove('active'))
      sw.classList.add('active')
      document.getElementById('pColorPicker').value = c
      document.getElementById('pColorHex').value    = c
      schedulePanelRender()
    }
    row.appendChild(sw)
  })
}

function buildBgPicks() {
  const picks = [
    { label:'City Night',  url:'https://images.pexels.com/photos/1105766/pexels-photo-1105766.jpeg' },
    { label:'Forest',      url:'https://images.pexels.com/photos/167698/pexels-photo-167698.jpeg'   },
    { label:'Ocean',       url:'https://images.pexels.com/photos/1295036/pexels-photo-1295036.jpeg' },
    { label:'Coffee',      url:'https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg'   },
    { label:'Dark Tech',   url:'https://images.pexels.com/photos/1714208/pexels-photo-1714208.jpeg' },
    { label:'Mountains',   url:'https://images.pexels.com/photos/417173/pexels-photo-417173.jpeg'   },

      schedulePanelRender()

function onAnimateToggle() {
  const on = document.getElementById('pAnimateToggle').checked
  document.getElementById('pAnimateOpts').style.display = on ? 'flex' : 'none'
  schedulePanelRender()
}

function openPanel(v) {
  activeTileId = vkey(v)
  document.querySelectorAll('.tile').forEach(t => {
    t.classList.toggle('active-tile', t.dataset.vkey === vkey(v))
  })

  document.getElementById('panelTitle').textContent = v.label
  document.getElementById('panelCat').textContent   = v.cat + ' · ' + v.id

  // Set defaults
  const d = v.defaults || {}
  document.getElementById('pBrandName').value   = d.brandName    || 'Acme Studio'
  document.getElementById('pHeadline').value    = d.headline     || 'The future ships today'
  document.getElementById('pSubheadline').value = d.subheadline  || ''
  document.getElementById('pStat').value        = d.stat         || ''
  document.getElementById('pCtaText').value     = d.ctaText      || ''
  document.getElementById('pBgUrl').value       = ''
  document.getElementById('pColorPicker').value = v.color
  document.getElementById('pColorHex').value    = v.color

  // Pre-set animation toggle for animated variants
  const isAnimated = !!v.animated
  document.getElementById('pAnimateToggle').checked = isAnimated
  document.getElementById('pAnimateOpts').style.display = isAnimated ? 'flex' : 'none'
  if (isAnimated && v.animation) {
    document.getElementById('pAnimationType').value = v.animation
  }

  // Build extra JSON from variant-specific defaults
  const skip = new Set(['brandName','headline','subheadline','stat','ctaText'])
  const extra = Object.fromEntries(Object.entries(d).filter(([k]) => !skip.has(k)))
  document.getElementById('pExtra').value = Object.keys(extra).length
    ? JSON.stringify(extra, null, 2) : ''

  // Set preset
  panelPreset = v.preset || 'instagram-square'
  document.querySelectorAll('.p-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.preset === panelPreset)
  })

  document.getElementById('panel').classList.add('open')
  document.getElementById('galleryWrap').classList.add('panel-open')

  panelRender()
}

function closePanel() {
  document.getElementById('panel').classList.remove('open')
  document.getElementById('galleryWrap').classList.remove('panel-open')
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('active-tile'))
  activeTileId = null
}

function setPanelPreset(btn) {
  document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  panelPreset = btn.dataset.preset
  schedulePanelRender()
}

function syncPanelColor(source) {
  if (source === 'picker') {
    document.getElementById('pColorHex').value = document.getElementById('pColorPicker').value
  } else {
    const h = document.getElementById('pColorHex').value.trim()
    if (/^#[0-9a-fA-F]{6}$/.test(h)) document.getElementById('pColorPicker').value = h
  }
  schedulePanelRender()
}

function schedulePanelRender() {
  clearTimeout(panelDebounce)
  panelDebounce = setTimeout(panelRender, 500)
}

// Wire panel inputs
;['pBrandName','pHeadline','pSubheadline','pStat','pCtaText','pColorHex','pExtra','pBgUrl'].forEach(id => {
  document.getElementById(id).addEventListener('input', schedulePanelRender)
})

async function panelRender() {
  if (panelRendering) return
  panelRendering = true
  const btn = document.getElementById('rerenderBtn')
  btn.disabled = true
  btn.textContent = 'Rendering…'

  const preview = document.getElementById('panelPreview')
  const existingImg = preview.querySelector('img')
  if (existingImg) {
    const spin = document.createElement('div')
    spin.className = 'panel-spinner'
    spin.style.cssText = 'position:absolute'
    preview.appendChild(spin)
  } else {
    preview.innerHTML = '<div class="panel-spinner"></div>'
  }

  const extra = getPanelExtra()
  if (extra === null) { resetPanelBtn(); return }

  const isGif   = document.getElementById('pAnimateToggle').checked
  const bgUrl   = document.getElementById('pBgUrl').value.trim()
  // activeTileId is a vkey; the real variant id is always the base variant id
  const variantId = VARIANTS.find(x => vkey(x) === activeTileId)?.id || activeTileId

  const payload = {
    variant:      variantId,
    brandName:    document.getElementById('pBrandName').value.trim()   || 'Acme Studio',
    primaryColor: document.getElementById('pColorHex').value.trim()    || '#5b5bd6',
    headline:     document.getElementById('pHeadline').value.trim()    || 'The future ships today',
    subheadline:  document.getElementById('pSubheadline').value.trim() || undefined,
    stat:         document.getElementById('pStat').value.trim()        || undefined,
    ctaText:      document.getElementById('pCtaText').value.trim()     || undefined,
    ...(bgUrl ? { bgImageData: bgUrl } : {}),
    preset:       panelPreset,
    tokens:       { _cb: String(Date.now()) },
    ...extra,
  }
  if (isGif) {
    payload.animation = document.getElementById('pAnimationType').value
    payload.frames    = parseInt(document.getElementById('pFrames').value)   || 10
    payload.delay     = parseInt(document.getElementById('pDelay').value)    || 7
  }
  Object.keys(payload).forEach(k => payload[k] === undefined && delete payload[k])

  const endpoint = isGif ? '/render-animated' : '/render'
  const t0 = Date.now()
  try {
    const res = await fetch(`${API_BASE}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
      body: JSON.stringify(payload),
    })
    if (!res.ok) {
      const e = await res.text()
      preview.innerHTML = `<div style="color:#f87171;font-size:12px;font-family:monospace;padding:12px;word-break:break-all">Error ${res.status}: ${escHtml(e)}</div>`
      resetPanelBtn(); return
    }

    const bytes = await res.arrayBuffer()
    const mime  = isGif ? 'image/gif' : 'image/png'
    const blob  = new Blob([bytes], { type: mime })
    if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl)
    currentBlobUrl = URL.createObjectURL(blob)

    preview.innerHTML = ''
    const img = document.createElement('img')
    img.src = currentBlobUrl
    img.alt = variantId
    preview.appendChild(img)

    const timing = document.createElement('div')
    timing.className = 'panel-timing'
    timing.textContent = `${Date.now() - t0}ms · ${(bytes.byteLength / 1024).toFixed(0)} KB${isGif ? ' · GIF' : ''}`
    preview.appendChild(timing)

  } catch (err) {
    preview.innerHTML = `<div style="color:#f87171;font-size:12px;font-family:monospace;padding:12px">Network error: ${escHtml(err.message)}</div>`
  }
  resetPanelBtn()
}

function getPanelExtra() {
  try {
    const raw = document.getElementById('pExtra').value.trim()
    return raw ? JSON.parse(raw) : {}
  } catch {
    document.getElementById('pExtra').style.borderColor = '#e11d48'
    setTimeout(() => { document.getElementById('pExtra').style.borderColor = '' }, 2000)
    panelRendering = false
    return null
  }
}

function resetPanelBtn() {
  panelRendering = false
  const btn = document.getElementById('rerenderBtn')
  btn.disabled = false
  btn.textContent = 'Re-render'
}

async function downloadCard() {
  if (!currentBlobUrl) return
  const isGif = document.getElementById('pAnimateToggle').checked
  const ext   = isGif ? 'gif' : 'png'
  const variantId = VARIANTS.find(x => vkey(x) === activeTileId)?.id || activeTileId || 'card'
  const a = document.createElement('a')
  a.href = currentBlobUrl
  a.download = `${variantId}-${panelPreset}.${ext}`
  a.click()
}

// ─────────────────────────────────────────────────────────────
// AI GENERATE FROM PROMPT
// ─────────────────────────────────────────────────────────────
async function generateFromPrompt() {
  const prompt = document.getElementById('searchInput').value.trim()
  if (!prompt || prompt.length < 6) return

  const genBtn   = document.getElementById('generateBtn')
  const genBadge = document.getElementById('genBadge')
  const genLabel = document.getElementById('genLabel')
  genBtn.disabled = true
  genBadge.classList.add('visible')
  genLabel.textContent = 'Thinking…'

  try {
    const res = await fetch(`${API_BASE}/parse-prompt`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
      body: JSON.stringify({ prompt }),
    })

    if (!res.ok) {
      genLabel.textContent = `Error ${res.status}`
      setTimeout(() => { genBadge.classList.remove('visible') }, 3000)
      genBtn.disabled = false
      return
    }

    const { params } = await res.json()
    genLabel.textContent = 'Rendering…'

    // Find or default variant
    const vid = (params.variant && VARIANTS.find(v => v.id === params.variant))
      ? params.variant : 'stat-hero'
    const v = VARIANTS.find(x => x.id === vid)

    // Apply parsed params to panel
    activeTileId = vid
    document.getElementById('panelTitle').textContent = v.label
    document.getElementById('panelCat').textContent   = v.cat + ' · ' + v.id

    document.getElementById('pBrandName').value   = params.brandName   || v.defaults?.brandName    || 'Acme Studio'
    document.getElementById('pHeadline').value    = params.headline    || v.defaults?.headline     || ''
    document.getElementById('pSubheadline').value = params.subheadline || v.defaults?.subheadline  || ''
    document.getElementById('pStat').value        = params.stat        || v.defaults?.stat         || ''
    document.getElementById('pCtaText').value     = params.ctaText     || v.defaults?.ctaText      || ''
    document.getElementById('pBgUrl').value       = params.bgImageData || ''
    const color = params.primaryColor || v.color
    document.getElementById('pColorPicker').value = color
    document.getElementById('pColorHex').value    = color

    const preset = params.preset || v.preset || 'instagram-square'
    panelPreset  = preset
    document.querySelectorAll('.p-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.preset === preset)
    })

    // Build extra JSON from remaining variant defaults
    const skip = new Set(['brandName','headline','subheadline','stat','ctaText'])
    const extra = Object.fromEntries(Object.entries(v.defaults || {}).filter(([k]) => !skip.has(k)))
    document.getElementById('pExtra').value = Object.keys(extra).length
      ? JSON.stringify(extra, null, 2) : ''

    // Open panel
    document.getElementById('panel').classList.add('open')
    document.getElementById('galleryWrap').classList.add('panel-open')

    // Highlight tile
    document.querySelectorAll('.tile').forEach(t => {
      t.classList.toggle('active-tile', t.dataset.vkey === vid)
    })
    const targetTile = document.querySelector(`[data-vkey="${vid}"]`)
    if (targetTile) targetTile.scrollIntoView({ behavior: 'smooth', block: 'center' })

    await panelRender()

  } catch (err) {
    genLabel.textContent = 'Failed — ' + err.message
    setTimeout(() => { genBadge.classList.remove('visible') }, 3000)
  }

  genBadge.classList.remove('visible')
  genBtn.disabled = false
}

// UTILS
// ─────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

// ─────────────────────────────────────────────────────────────
buildSwatches()
buildBgPicks()
renderGallery()
